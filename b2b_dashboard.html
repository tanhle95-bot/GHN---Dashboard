<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Detailed Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            color: transparent;
        }

        h1 span {
            color: var(--accent-purple);
            font-weight: 400;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .kpi-title {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h2::before {
            content: '';
            display: block;
            width: 4px;
            height: 16px;
            background-color: var(--accent-blue);
            border-radius: 2px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            position: sticky;
            top: 0;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        td {
            padding: 1rem;
            font-size: 0.9375rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .badge {
            padding: 0.3rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .brand-Con { background: rgba(236, 72, 153, 0.2); color: #f9a8d4; }
        .brand-ANTA { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .brand-Aqua { background: rgba(6, 182, 212, 0.2); color: #67e8f9; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        @media (max-width: 1024px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./b2b_data.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div>
                <h1>Theo dõi <span>Khách hàng B2B Ưu tiên</span></h1>
                <p class="subtitle">Chi tiết đơn hàng đang lưu kho cần xử lý</p>
            </div>
            <div>
                <a href="dashboard.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 500;">&larr; Về Dashboard Chung</a>
            </div>
        </header>

        <div class="kpi-row">
            <div class="kpi-card" style="border-top: 4px solid var(--accent-blue);">
                <div class="kpi-title">Tổng đơn hàng</div>
                <div class="kpi-value" id="kpi-total">0</div>
            </div>
            <div class="kpi-card" style="border-top: 4px solid var(--accent-pink);">
                <div class="kpi-title">Con Cưng</div>
                <div class="kpi-value" id="kpi-concung">0</div>
            </div>
            <div class="kpi-card" style="border-top: 4px solid var(--success);">
                <div class="kpi-title">ANTA</div>
                <div class="kpi-value" id="kpi-anta">0</div>
            </div>
            <div class="kpi-card" style="border-top: 4px solid var(--accent-cyan);">
                <div class="kpi-title">Aqua B2C</div>
                <div class="kpi-value" id="kpi-aqua">0</div>
            </div>
        </div>

        <div class="charts-row">
            <div class="card">
                <h2>Tỷ trọng Khách Hàng</h2>
                <div class="chart-container">
                    <canvas id="clientChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h2>Phân bố theo Kho (Top 10)</h2>
                <div class="chart-container">
                    <canvas id="warehouseChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Chi tiết Danh sách Đơn hàng (173 đơn)</h2>
            <div class="table-container">
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>Order Code</th>
                            <th>Thương hiệu</th>
                            <th>Kho hiện tại</th>
                            <th>PIC</th>
                            <th>Mức ưu tiên</th>
                            <th>Đã lưu kho</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof b2bData === 'undefined') {
                console.error("Data not loaded!");
                return;
            }

            // 1. Populate KPIs
            document.getElementById('kpi-total').innerText = b2bData.total;
            document.getElementById('kpi-concung').innerText = b2bData.by_client['Con Cưng'] || 0;
            document.getElementById('kpi-anta').innerText = b2bData.by_client['ANTA'] || 0;
            document.getElementById('kpi-aqua').innerText = b2bData.by_client['Aqua B2C'] || 0;

            // 2. Client Chart (Doughnut)
            const ctxClient = document.getElementById('clientChart').getContext('2d');
            new Chart(ctxClient, {
                type: 'doughnut',
                data: {
                    labels: ['Con Cưng', 'ANTA', 'Aqua B2C'],
                    datasets: [{
                        data: [
                            b2bData.by_client['Con Cưng'] || 0,
                            b2bData.by_client['ANTA'] || 0,
                            b2bData.by_client['Aqua B2C'] || 0
                        ],
                        backgroundColor: [
                            'rgba(236, 72, 153, 0.8)',
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(6, 182, 212, 0.8)'
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8' } }
                    },
                    cutout: '70%'
                }
            });

            // 3. Warehouse Chart (Bar)
            // Get top 10
            const topWarehouses = b2bData.by_warehouse.slice(0, 10);
            const ctxWH = document.getElementById('warehouseChart').getContext('2d');
            new Chart(ctxWH, {
                type: 'bar',
                data: {
                    labels: topWarehouses.map(w => w.warehouse),
                    datasets: [{
                        label: 'Số đơn',
                        data: topWarehouses.map(w => w.count),
                        backgroundColor: 'rgba(139, 92, 246, 0.7)',
                        borderRadius: 6,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { display: false } },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });

            // 4. Populate Table
            const tbody = document.querySelector('#ordersTable tbody');
            b2bData.orders.forEach(order => {
                const tr = document.createElement('tr');
                
                let brandClass = '';
                if (order.client.includes('Con')) brandClass = 'brand-Con';
                else if (order.client.includes('ANTA')) brandClass = 'brand-ANTA';
                else if (order.client.includes('Aqua')) brandClass = 'brand-Aqua';

                tr.innerHTML = `
                    <td style="font-family: monospace; font-weight: 600;">${order.order_code}</td>
                    <td><span class="badge ${brandClass}">${order.client}</span></td>
                    <td>${order.warehouse}</td>
                    <td>${order.pic}</td>
                    <td style="color: var(--warning);">${order.priority.split(':')[0] || order.priority}</td>
                    <td><strong>${order.storage_days}</strong> ngày</td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
